name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SFTP
        # wlixcc/SFTP-Deploy-Action v1.2.4 — pinned to exact commit SHA
        uses: wlixcc/SFTP-Deploy-Action@9e1bcb6b77e5f3e04f29c7dab9d04a8f2dfe0de4
        with:
          username: 'acc493990683'
          server: 'access971979113.webspace-data.io'
          port: 22
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './*'
          remote_path: '/'
          sftp_only: true
          delete_remote_files: false
