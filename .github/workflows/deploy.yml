name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy changed files via SFTP
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt

          while IFS= read -r file; do
            if [[ "$file" == .git* ]] || [[ "$file" == tests/* ]] || [[ "$file" == *.sql ]] || [[ "$file" == *.mov ]]; then
              continue
            fi
            if [ ! -f "$file" ]; then
              continue
            fi
            remote_path="/cotracgroup/$file"
            remote_dir=$(dirname "$remote_path")
            lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://access971979113.webspace-data.io -e "-mkdir -p $remote_dir; put $file -o $remote_path; bye"
          done < /tmp/changed_files.txt
