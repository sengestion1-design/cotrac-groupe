name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -u "${{ secrets.SFTP_USER }}","${{ secrets.SFTP_PASSWORD }}" sftp://access971979113.webspace-data.io << 'EOF'
          set sftp:connect-program "ssh -o StrictHostKeyChecking=yes"
          set net:timeout 30
          mirror -R --delete --verbose --exclude=^\.git/ --exclude=^tests/ --exclude=^\.DS_Store --exclude=cotrac_db\.sql --exclude=cotrac_ionos\.sql . /
          bye
          EOF
