name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt

      - name: Deploy changed files via SFTP
        run: |
          while IFS= read -r file; do
            # Skip excluded files
            if [[ "$file" == .git* ]] || [[ "$file" == tests/* ]] || [[ "$file" == *.sql ]] || [[ "$file" == *.mov ]]; then
              continue
            fi
            # Skip deleted files
            if [ ! -f "$file" ]; then
              continue
            fi
            remote_dir=$(dirname "/cotracgroup/$file")
            lftp -u "${{ secrets.SFTP_USER }}","${{ secrets.SFTP_PASSWORD }}" sftp://access971979113.webspace-data.io << LFTP
            set sftp:connect-program "ssh -o StrictHostKeyChecking=yes"
            set net:timeout 30
            -mkdir -p $remote_dir
            put "$file" -o "/cotracgroup/$file"
            bye
LFTP
          done < /tmp/changed_files.txt
